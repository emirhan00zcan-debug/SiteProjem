<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Detay | Sinop Özcan Mobilya</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-detail-header {
            height: 60vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            color: #fff;
            text-align: center;
        }

        .blog-detail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .blog-detail-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }

        .blog-meta-tag {
            background: var(--primary-teal);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .blog-detail-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .blog-detail-date {
            font-size: 1rem;
            opacity: 0.9;
        }

        .article-container {
            max-width: 800px;
            margin: -50px auto 50px;
            background: #fff;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 3;
        }

        .article-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #444;
        }

        .article-body p {
            margin-bottom: 1.5rem;
        }

        .article-body h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--secondary-black);
        }

        .article-body ul {
            margin-bottom: 1.5rem;
            padding-left: 20px;
        }

        .article-body li {
            margin-bottom: 0.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--accent-grey);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary-teal);
            gap: 15px;
        }

        @media (max-width: 768px) {
            .blog-detail-title {
                font-size: 2rem;
            }

            .article-container {
                margin: 0;
                border-radius: 0;
                padding: 2rem 5%;
                box-shadow: none;
            }

            .blog-detail-header {
                height: 40vh;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 15px;">
                    <img src="assets/images/ozcan-logo.png" alt="Özcan Mobilya Logo" class="logo">
                    <div class="brand-info">
                        <span class="brand-name">ÖZCAN MOBİLYA</span>
                    </div>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="koleksiyon.html">Projelerimiz</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="hakkimizda.html">Hakkımızda</a></li>
                <li><a href="index.html#social-contact">İletişim</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fas fa-search"></i>
                <div class="menu-toggle"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
    </header>

    <div id="blogContent">
        <!-- Dynamic Content Will Be Loaded Here -->
        <div style="height: 50vh; display: flex; align-items: center; justify-content: center;">
            <p>Yükleniyor...</p>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Özcan Mobilya. Tüm hakları saklıdır.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId) {
            fetch(`/api/blog/${postId}`)
                .then(response => {
                    if (!response.ok) throw new Error('Yazı bulunamadı');
                    return response.json();
                })
                .then(post => {
                    const html = `
                        <div class="blog-detail-header" style="background-image: url('${post.image}');">
                            <div class="blog-detail-overlay"></div>
                            <div class="blog-detail-content">
                                <span class="blog-meta-tag">${post.category}</span>
                                <h1 class="blog-detail-title">${post.title}</h1>
                                <span class="blog-detail-date"><i class="far fa-calendar-alt"></i> ${post.date}</span>
                            </div>
                        </div>

                        <div class="article-container">
                            <a href="blog.html" class="back-link"><i class="fas fa-arrow-left"></i> Blog'a Dön</a>
                            <div class="article-body">
                                ${post.content}
                            </div>
                        </div>
                    `;
                    document.getElementById('blogContent').innerHTML = html;
                    document.title = `${post.title} | Sinop Özcan Mobilya Blog`;
                })
                .catch(error => {
                    document.getElementById('blogContent').innerHTML = `
                        <div style="text-align: center; padding: 5rem;">
                            <h2>Yazı Bulunamadı</h2>
                            <p>Aradığınız blog yazısı mevcut değil veya kaldırılmış.</p>
                            <a href="blog.html" class="btn-primary" style="margin-top: 20px;">Blog Ana Sayfasına Dön</a>
                        </div>
                    `;
                });
        } else {
            window.location.href = 'blog.html';
        }
    </script>
</body>

</html>
